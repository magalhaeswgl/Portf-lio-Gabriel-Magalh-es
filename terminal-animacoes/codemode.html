<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smoke Effect - Code Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent !important;
            overflow: hidden;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent !important;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="smokeCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('smokeCanvas');
            let ctx = canvas.getContext('2d');
            let width, height;
            let animationId = null;
            let isActive = true;
            
            let particles = [];
            const mouse = { x: undefined, y: undefined };
            
            class Particle {
                constructor() {
                    this.x = mouse.x !== undefined ? mouse.x : width / 2;
                    this.y = mouse.y !== undefined ? mouse.y : height / 2;
                    this.size = Math.random() * 35 + 15;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.fadeSpeed = Math.random() * 0.004 + 0.002;
                    this.speedX = Math.random() * 1.2 - 0.6;
                    this.speedY = Math.random() * -0.8 - 0.3;
                    
                    this.points = [];
                    for(let i = 0; i < 6; i++) {
                        this.points.push({
                            angle: (Math.PI * 2 / 6) * i,
                            dist: Math.random() * 0.8 + 0.3
                        });
                    }
                    
                    this.vibrations = [];
                    for(let i = 0; i < 6; i++) {
                        this.vibrations.push({
                            speed: Math.random() * 0.12 + 0.04,
                            phase: Math.random() * Math.PI * 2,
                            intensity: Math.random() * 0.3 + 0.15
                        });
                    }
                    
                    this.rotation = Math.random() * Math.PI * 2;
                    this.age = 0;
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.opacity -= this.fadeSpeed;
                    this.size += 0.15;
                    this.rotation += 0.004;
                    this.age++;
                    
                    const ageFactor = Math.min(1, this.age / 180);
                    
                    for(let i = 0; i < 6; i++) {
                        const v = this.vibrations[i];
                        v.phase += v.speed;
                        const vibration = Math.sin(v.phase) * v.intensity * (0.5 + ageFactor * 0.5);
                        this.points[i].dist = 0.7 + vibration;
                        if(this.points[i].dist < 0.2) this.points[i].dist = 0.2;
                        if(this.points[i].dist > 1.3) this.points[i].dist = 1.3;
                    }
                }
                
                draw() {
                    if (this.opacity <= 0.02) return;
                    
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    
                    ctx.beginPath();
                    for(let i = 0; i <= this.points.length; i++) {
                        let p = this.points[i % this.points.length];
                        const angleVar = Math.sin(this.vibrations[i % 6].phase * 2) * 0.1;
                        const posX = Math.cos(p.angle + angleVar) * this.size * p.dist;
                        const posY = Math.sin(p.angle + angleVar) * this.size * p.dist;
                        
                        if(i === 0) ctx.moveTo(posX, posY);
                        else ctx.lineTo(posX, posY);
                    }
                    ctx.closePath();
                    
                    const opacityVal = this.opacity * (1 - this.age / 250);
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                    gradient.addColorStop(0, `rgba(100, 30, 140, ${opacityVal})`);
                    gradient.addColorStop(0.6, `rgba(60, 15, 90, ${opacityVal * 0.5})`);
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            
            function handleMouseMove(e) {
                if (!isActive) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                mouse.x = (e.clientX - rect.left) * scaleX;
                mouse.y = (e.clientY - rect.top) * scaleY;
                
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle());
                }
            }
            
            function handleTouchMove(e) {
                if (!isActive) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                mouse.x = (touch.clientX - rect.left) * scaleX;
                mouse.y = (touch.clientY - rect.top) * scaleY;
                
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle());
                }
            }
            
            function animate() {
                if (!isActive) return;
                
                ctx.clearRect(0, 0, width, height);
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    if (particles[i].opacity <= 0.01 || particles[i].age > 250) {
                        particles.splice(i, 1);
                    }
                }
                
                animationId = requestAnimationFrame(animate);
            }
            
            function start() {
                if (animationId) cancelAnimationFrame(animationId);
                resizeCanvas();
                particles = [];
                isActive = true;
                animate();
            }
            
            function stop() {
                isActive = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                ctx.clearRect(0, 0, width, height);
                particles = [];
            }
            
            // Eventos
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('resize', () => {
                if (isActive) {
                    resizeCanvas();
                }
            });
            
            start();
            
            window.smokeControls = { start, stop };
        })();
    </script>
</body>
</html>
